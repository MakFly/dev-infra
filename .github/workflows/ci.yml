name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Bash syntax check
        run: bash -n bin/devhub data/scripts/*.sh

      - name: ShellCheck
        run: shellcheck -x --severity=warning bin/devhub data/scripts/*.sh

      - name: Compose config
        run: COMPOSE_PROFILES=core,async,node docker compose --env-file .env.example -f compose.yml config > /dev/null

  test:
    name: Bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bats
        run: sudo apt-get update -q && sudo apt-get install -y -q bats

      - name: Run tests
        run: bats tests
