name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE="$(tr -d '[:space:]' < VERSION)"
          if [ "$TAG" != "$FILE" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match VERSION file (${FILE})"
            exit 1
          fi

      - name: Build tarball
        run: |
          mkdir -p dist
          git archive --format=tar.gz \
            --prefix="devhub-${GITHUB_REF_NAME}/" \
            -o "dist/devhub-${GITHUB_REF_NAME}.tar.gz" \
            "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/devhub-${GITHUB_REF_NAME}.tar.gz" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
